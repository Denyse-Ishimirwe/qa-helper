# Render Blueprint: https://render.com/docs/blueprint-spec
# Apply: Dashboard → New → Blueprint → connect this repo.
#
# Persistence: set LIBSQL_URL + LIBSQL_AUTH_TOKEN (Turso — free tier friendly, no disk needed).
# Or use Starter+ disk below for SQLite files. Do not rely on both for the same data.
#
# Free tier without disk: remove `disk:`, remove DATABASE_PATH / UPLOADS_DIR, set plan: free,
# and add Turso env vars in the dashboard.

services:
  - type: web
    name: qa-helper
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /data/qahelper.db
      - key: UPLOADS_DIR
        value: /data/uploads
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: LIBSQL_URL
        sync: false
      - key: LIBSQL_AUTH_TOKEN
        sync: false
    disk:
      name: qahelper-data
      mountPath: /data
      sizeGB: 1
